name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    name: pytest (Python ${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt allure-pytest

      - name: Run tests (self-contained, uses built-in mock platform)
        run: pytest -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-py${{ matrix.python-version }}
          path: allure-results

  analyze:
      needs: test
      if: always()
      runs-on: ubuntu-latest
      steps:
        - name: Checkout analyzer
          uses: actions/checkout@v4
          with:
            repository: chengnick/allure-ai-analyzer
            path: analyzer

        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Download allure results
          uses: actions/download-artifact@v4
          with:
            name: allure-results-py3.11
            path: allure-results

        - name: Run analyzer
          env:
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          run: |
            pip install -r analyzer/requirements.txt
            python analyzer/main.py allure-results -o analysis-report.md

        - name: Upload analysis
          uses: actions/upload-artifact@v4
          with:
            name: failure-analysis
            path: analysis-report.md
            
  analyze-offline:
      needs: test
      if: always()
      runs-on: ubuntu-latest
      steps:
        - name: Checkout analyzer
          uses: actions/checkout@v4
          with:
            repository: chengnick/allure-ai-analyzer
            path: analyzer
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - name: Download allure results
          uses: actions/download-artifact@v4
          with:
            name: allure-results-py3.11
            path: allure-results
        - name: Block Gemini endpoint (offline proof)
          run: echo "127.0.0.1 generativelanguage.googleapis.com" | sudo tee -a /etc/hosts
        - name: Run analyzer offline (no key, no AI)
          run: |
            pip install -r analyzer/requirements.txt
            python analyzer/main.py allure-results --no-ai -o analysis-offline.md
        - name: Upload offline analysis
          uses: actions/upload-artifact@v4
          with:
            name: failure-analysis-offline
            path: analysis-offline.md